<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Sattam | Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap');

        body {
            background-color: #0a0a0a;
            color: #00ff41;
            font-family: 'Courier Prime', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            text-shadow: 0 0 5px #00ff41;
        }

        /* تأثير خطوط الشاشة القديمة */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #terminal {
            flex-grow: 1;
            white-space: pre-wrap;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .input-area {
            display: flex;
            border-top: 1px solid #00ff41;
            padding-top: 10px;
        }

        .prompt { margin-right: 10px; }

        input {
            background: transparent;
            border: none;
            color: #00ff41;
            font-family: inherit;
            font-size: 1.1em;
            outline: none;
            flex-grow: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #00ff41;
            padding-bottom: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .typing { overflow: hidden; white-space: nowrap; border-right: .15em solid #00ff41; animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite; }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff41; } }
    </style>
</head>
<body>

<div class="header">
    <div>SYSTEM: ACTIVE</div>
    <div id="clock">00:00:00</div>
</div>

<div id="terminal"></div>

<div class="input-area">
    <span class="prompt">Sattam@Root:~$</span>
    <input type="text" id="user-input" autofocus autocomplete="off">
</div>

<script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('user-input');
    const clock = document.getElementById('clock');

    // تحديث الساعة
    setInterval(() => {
        clock.textContent = new Date().toLocaleTimeString('en-GB');
    }, 1000);

    const welcomeMsg = "Initializing System... \nConnection established. \nWelcome back, Commander. \nType 'help' to see available commands.\n\n";
    
    // تأثير الكتابة التلقائية
    let i = 0;
    function typeWriter() {
        if (i < welcomeMsg.length) {
            terminal.innerHTML += welcomeMsg.charAt(i);
            i++;
            setTimeout(typeWriter, 30);
            terminal.scrollTop = terminal.scrollHeight;
        }
    }

    typeWriter();

    // معالجة الأوامر
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = input.value.toLowerCase().trim();
            terminal.innerHTML += `\n<span style="color:#fff">> ${cmd}</span>\n`;
            
            if (cmd === 'help') {
                terminal.innerHTML += "Available: [status] [clear] [scar] [morse]\n";
            } else if (cmd === 'status') {
                terminal.innerHTML += "ALL SYSTEMS: OPTIMAL\nFIREWALL: ACTIVE\nLOCATION: RIYADH_SECTOR\n";
            } else if (cmd === 'scar') {
                terminal.innerHTML += "Redirecting to s8crx channel...\n";
                window.open('https://www.youtube.com/@s8crx', '_blank');
            } else if (cmd === 'clear') {
                terminal.innerHTML = '';
            } else if (cmd === 'morse') {
                terminal.innerHTML += "Signal: .... . .-.. .-.. --- (HELLO)\n";
            } else {
                terminal.innerHTML += `Command not found: ${cmd}\n`;
            }

            input.value = '';
            terminal.scrollTop = terminal.scrollHeight;
        }
    });
</script>

</body>
</html>
