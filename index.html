<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Courier+Prime&display=swap');
        :root { --primary: #00d4ff; --bg: #05060a; --panel: #0d1117; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #lock-screen { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input[type="password"] { background: #1a1d23; border: 1px solid var(--primary); color: #fff; padding: 12px; border-radius: 5px; text-align: center; width: 250px; outline: none; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: var(--panel); padding: 15px; border: 1px solid #30363d; border-radius: 8px; text-align: center; }
        .card p { font-size: 1.4rem; font-weight: bold; color: var(--primary); margin: 5px 0; }
        .terminal { flex-grow: 1; background: #000; border: 1px solid var(--primary); border-radius: 5px; display: flex; flex-direction: column; font-family: 'Courier Prime', monospace; }
        #logs { flex-grow: 1; padding: 15px; overflow-y: auto; color: #00ff41; font-size: 0.9rem; }
        .controls { background: #111; padding: 15px; border-top: 1px solid var(--primary); display: flex; flex-direction: column; gap: 10px; }
        select, .cmd-in { background: #1a1d23; border: 1px solid #333; color: #fff; padding: 10px; outline: none; border-radius: 4px; font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body>

<div id="lock-screen">
    <h1 style="color: var(--primary);">INSIDE CITY | نظام القطاعات الحكومية</h1>
    <input type="password" id="pass-input" placeholder="أدخل رمز الدخول">
</div>

<div class="main-content">
    <div class="dashboard">
        <div class="card"><h3>حالة القطاعات</h3><p>جاهز للعمل</p></div>
        <div class="card"><h3>الوزارات المربوطة</h3><p>6 قطاعات</p></div>
        <div class="card"><h3>التوقيت</h3><p id="clock">00:00:00</p></div>
    </div>

    <div class="terminal">
        <div id="logs">>> نظام انسايد سيتي الحكومي.. اختر الجهة المستهدفة وابدأ البث.</div>
        <div class="controls">
            <div style="display: flex; gap: 10px;">
                <label style="align-self: center;">توجيه البث:</label>
                <select id="target" style="flex-grow: 1;">
                    <option value="all">⚡ بث شامل (إرسال لكل الوزارات والقطاعات)</option>
                    <option value="news">📢 إعلانات المواطنين العامة</option>
                    <option value="intel">👁️ جهاز الاستخبارات</option>
                    <option value="defense">🎖️ وزارة الدفاع</option>
                    <option value="health">🚑 وزارة الصحة</option>
                    <option value="police">🚓 وزارة الداخلية (الشرطة)</option>
                    <option value="admin">🔒 مكتب الإدارة العليا</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <span style="color: var(--primary); align-self: center;">COMMAND ></span>
                <input type="text" id="msg-input" class="cmd-in" style="flex-grow: 1;" placeholder="اكتب التعميم الوزاري هنا...">
            </div>
        </div>
    </div>
</div>

            admin: "https://discord.com/channels/1461015247707045890/1462796937257291776"
        }
    };

    document.getElementById('pass-input').addEventListener('input', (e) => {
        if (e.target.value === CONFIG.pass) {
            document.getElementById('lock-screen').style.display = 'none';
        }
    });

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('ar-SA'); }, 1000);

    function addLog(text, color = "#00ff41") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerHTML = `[${new Date().toLocaleTimeString()}] >> ${text}`;
        const logs = document.getElementById('logs');
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    async function sendRequest(url, message, name) {
        if (!url || url.includes("رابط_")) return false;
        try {
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: `INSIDE OS | ${name.toUpperCase()}`,
                    avatar_url: "https://i.imgur.com/AfFp7pu.png",
                    content: message
                })
            });
            return true;
        } catch { return false; }
    }

    document.getElementById('msg-input').addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const msg = e.target.value.trim();
            const target = document.getElementById('target').value;
            if (!msg) return;

            if (target === 'all') {
                addLog("جاري بدء البث الحكومي الشامل لكل القطاعات...", "cyan");
                for (const [key, url] of Object.entries(CONFIG.webhooks)) {
                    const ok = await sendRequest(url, `🚨 **تعميم إداري شامل لجميع القطاعات:**\n${msg}`, key);
                    if (ok) addLog(`تم إبلاغ [${key}] بنجاح ✅`);
                }
            } else {
                const ok = await sendRequest(CONFIG.webhooks[target], msg, target);
                if (ok) addLog(`تم إرسال البرقية إلى [${target}] ✅`);
            }
            e.target.value = '';
        }
    });
</script>
