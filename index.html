<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>INSIDE CITY | ADMIN TERMINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Courier+Prime&display=swap');

        body {
            background-color: #020202;
            color: #ffffff;
            font-family: 'Courier Prime', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* نيون انسايد (أبيض ورمادي مع توهج خفيف) */
        .neon-text { text-shadow: 0 0 10px rgba(255, 255, 255, 0.7); }

        #auth-screen { text-align: center; border: 1px solid #444; padding: 40px; background: rgba(255,255,255,0.02); }

        #main-system {
            display: none;
            width: 95%;
            height: 90%;
            flex-direction: column;
            padding: 20px;
            border: 2px solid #333;
        }

        .terminal-box {
            flex-grow: 1;
            padding: 15px;
            background: #050505;
            overflow-y: auto;
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
        }

        input {
            background: transparent;
            border: 1px solid #555;
            color: #fff;
            padding: 10px;
            font-family: inherit;
            outline: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #111;
            padding: 5px 15px;
            font-size: 0.8em;
            border-bottom: 1px solid #fff;
        }

        .log-entry { margin-bottom: 5px; border-left: 3px solid #555; padding-left: 10px; }
        .inside-success { color: #00ff41; border-left-color: #00ff41; }
        .inside-alert { color: #ff3e3e; border-left-color: #ff3e3e; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h1 class="neon-text">INSIDE CITY</h1>
    <p>IDENTITY VERIFICATION REQUIRED</p>
    <input type="password" id="auth-code" placeholder="ENTER ACCESS KEY" maxlength="4">
</div>

<div id="main-system">
    <div class="status-bar">
        <span>CORE: INSIDE_SYSTEM_V3</span>
        <span id="clock">00:00:00</span>
        <span style="color: #00ff41;">● ENCRYPTED</span>
    </div>

    <div class="terminal-box" id="logs">
        <div class="log-entry inside-success">>> INSIDE CITY OPERATING SYSTEM LOADED.</div>
        <div class="log-entry">>> WELCOME, SAUD. WAITING FOR COMMAND...</div>
    </div>

    <div style="display: flex; gap: 10px; align-items: center; padding: 10px; background: #0a0a0a;">
        <span style="color: #00ff41;">SAUD@INSIDE:~$</span>
        <input type="text" id="cmd-input" style="flex-grow: 1; border: none;" autofocus autocomplete="off">
    </div>
</div>

<script>
    const AUTH_CODE = "1234"; // الرمز السري حقك
    const WEBHOOK_URL = "رابط_الويبهوك_هنا"; // حط رابط الويبهوك حق سيرفر انسايد هنا

    const authInput = document.getElementById('auth-code');
    const authScreen = document.getElementById('auth-screen');
    const mainSystem = document.getElementById('main-system');
    const logs = document.getElementById('logs');
    const cmdInput = document.getElementById('cmd-input');

    setInterval(() => {
        document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    authInput.addEventListener('input', () => {
        if (authInput.value === AUTH_CODE) {
            authScreen.style.display = 'none';
            mainSystem.style.display = 'flex';
            cmdInput.focus();
        }
    });

    async function broadcastToDiscord(msg) {
        try {
            await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: "INSIDE SYSTEM",
                    content: `📢 **إعلان من النظام:** \n ${msg}`
                })
            });
            addLog("Broadcast sent to Discord.", "inside-success");
        } catch {
            addLog("Error connecting to Discord.", "inside-alert");
        }
    }

    function addLog(text, type = "") {
        const div = document.createElement('div');
        div.className = `log-entry ${type}`;
        div.innerHTML = `>> ${text}`;
        logs.appendChild(div);
        logs.scrollTop = logs.scrollHeight;
    }

    cmdInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = cmdInput.value.trim();
            const args = val.split(' ');
            const cmd = args[0].toLowerCase();

            if (cmd === 'help') {
                addLog("Commands: [send] [status] [clear] [exit]");
            } else if (cmd === 'send') {
                const msg = args.slice(1).join(' ');
                broadcastToDiscord(msg);
            } else if (cmd === 'status') {
                addLog("INSIDE CITY SERVER: ONLINE", "inside-success");
                addLog("ADMIN: SAUD ABID", "inside-success");
            } else if (cmd === 'clear') {
                logs.innerHTML = '';
            } else if (cmd === 'exit') {
                location.reload();
            } else {
                addLog(`Unknown command: ${cmd}`, "inside-alert");
            }
            cmdInput.value = '';
        }
    });
</script>

</body>
</html>
